<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234f46e5'/><text x='50' y='72' font-size='65' font-weight='900' text-anchor='middle' fill='white'>C</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CoderV - Learn smarter, code better. Structured lessons, practice quizzes, and AI-powered support." />
    <title>CoderV | Learn Smarter, Code Better</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('coderv-theme');
          var isDark = stored ? stored === 'dark' : true;
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      html { background: #0b0b0d; color-scheme: dark; }
      html:not(.dark) { background: #fafafa; color-scheme: light; }
      body { background: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
